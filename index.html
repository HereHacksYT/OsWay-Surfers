<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OsWay Surfers - 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #111;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Ekran Göstergeleri */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        .ui-item {
            margin-bottom: 5px;
        }
        #gold-ui { color: #ffd700; }
        #board-ui { color: #2ed573; }
        #board-timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ff4757;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: none;
            z-index: 10;
        }
        /* Başlangıç Ekranı */
        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #2ed573;
            z-index: 30;
            width: 85%;
            max-width: 400px;
        }
        #start-screen h1 {
            margin: 0 0 10px 0;
            font-size: 42px;
            color: #2ed573;
            text-shadow: 2px 2px 0px #fff;
        }
        /* Market Ekranı (İkili Buton Düzeni) */
        #market-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 4px solid #ffd700;
            z-index: 35;
            width: 85%;
            max-width: 420px;
            display: none;
        }
        #market-screen h1 {
            margin: 0 0 10px 0;
            font-size: 36px;
            color: #ffd700;
        }
        .stats-box {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 18px;
        }
        /* Yan yana butonlar için taşıyıcı container */
        .market-btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 5px;
        }
        /* Oyun Bitti Ekranı */
        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            border: 4px solid #ff4757;
            display: none;
            z-index: 20;
            width: 80%;
            max-width: 400px;
        }
        #game-over-screen h1 {
            margin: 0 0 10px 0;
            font-size: 44px;
            color: #ff4757;
        }
        /* Buton Tasarımları */
        .btn-green {
            background-color: #2ed573;
            border: none;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            box-shadow: 0 5px 0px #26af5f;
        }
        .btn-green:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #26af5f;
        }
        .btn-yellow {
            background-color: #ffd700;
            border: none;
            color: #111;
            padding: 15px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            box-shadow: 0 5px 0px #cca100;
        }
        .btn-yellow:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0px #cca100;
        }
        .btn-red {
            background-color: #ff4757;
            border: none;
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            width: 100%;
            box-shadow: 0 4px 0px #d43f4c;
        }
        .btn-red:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0px #d43f4c;
        }
        /* Başlat butonu tam genişlikte kalmalı */
        .btn-full {
            padding: 15px 40px;
            font-size: 22px;
            margin-top: 10px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div id="start-screen">
        <h1>OsWay Surfers</h1>
        <p>Metro Macerası Başlıyor!</p>
        
        <div class="stats-box">
            <div id="menu-gold">Altının: 🌟 0</div>
            <div id="menu-boards">Kaykayın: 🛹 0 adet</div>
        </div>

        <button class="btn-green btn-full" onclick="startGame()">BAŞLA</button>
        <button class="btn-yellow btn-full" onclick="openMarket()">🛒 MARKET</button>
        
        <p style="font-size:12px; color:#aaa; margin-top:15px;">Çift Tıkla veya Boşluk Tuşu ile Kaykay Açılır!</p>
    </div>

    <div id="market-screen">
        <h1>METRO MARKET</h1>
        <p>Bir Kaykay sadece 5 Altın!</p>

        <div class="stats-box">
            <div id="market-gold">Altının: 🌟 0</div>
            <div id="market-boards">Kaykayın: 🛹 0 adet</div>
        </div>

        <div class="market-btn-row">
            <button class="btn-green" onclick="buyOneBoard()">🛹 1 TANE AL</button>
            <button class="btn-yellow" onclick="buyBoardsWithAllGold()">🌟 HEPSİNİ AL</button>
        </div>
        
        <button class="btn-red" onclick="closeMarket()">◀ GERİ DÖN</button>
    </div>

    <div id="ui">
        <div class="ui-item">Skor: <span id="score-val">0</span></div>
        <div id="gold-ui" class="ui-item">Altın: 🌟 <span id="gold-val">0</span></div>
        <div id="board-ui" class="ui-item">Kaykay: 🛹 <span id="board-val">0</span></div>
    </div>

    <div id="board-timer">Süre: 15</div>

    <div id="game-over-screen">
        <h1>YAKALANDIN!</h1>
        <p>Skorun: <span id="final-score">0</span></p>
        <p>Toplanan Altın: 🌟 <span id="final-gold">0</span></p>
        <button class="btn-green btn-full" onclick="resetGame()">Yeniden Başla</button>
    </div>

    <div id="canvas-container"></div>

    <script src="game.js"></script>
</body>
</html>
